name: CI

# Verifies the project still builds. This is the gate Dependabot auto-merge
# waits on, so a bad dependency bump can never be merged automatically.
# Runs on pull_request only: a branch push in the same repo would otherwise
# trigger this twice (once for push, once for the PR) and burn double the
# runner minutes. Pushes to main are built and deployed by publish-gh-pages.
on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check and build
        run: pnpm tsc
