name: Build and Publish Exports to Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Every night at 2:00 AM UTC

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once. A scheduled run won't clobber a manual one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        # Version comes from the "packageManager" field in package.json.

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and export files
        run: |
          pnpm tsc
          node dist/index.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./exports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
