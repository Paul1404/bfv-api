name: Build and Publish Exports to Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Every night at 2:00 AM UTC

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once. A scheduled run won't clobber a manual one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        # Version comes from the "packageManager" field in package.json.

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and export files
        run: |
          pnpm tsc
          node dist/index.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./exports

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # Set-and-forget alerting: a failed run opens (or comments on) a single
  # tracking issue, and the next successful run closes it. The only time this
  # repo asks for attention is when a run actually breaks.
  notify-failure:
    needs: build-and-deploy
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const label = 'deploy-failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Export/deploy is failing',
                labels: [label],
                body: [
                  `The \`${context.workflow}\` workflow failed (\`${context.eventName}\`).`,
                  '',
                  `Failed run: ${runUrl}`,
                  '',
                  'The previous good site stays online until a run succeeds.',
                  'This issue closes automatically when the next run passes.',
                ].join('\n'),
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Still failing. Latest failed run: ${runUrl}`,
              });
            }

  notify-recovery:
    needs: build-and-deploy
    if: success()
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v9
        with:
          script: |
            const label = 'deploy-failure';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: 'Recovered: the latest run succeeded and the site is up to date. Closing.',
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
            }
